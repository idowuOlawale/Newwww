<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kickoff — Live Football</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f4f4f2; --card:#fff; --border:#e6e6e3;
      --text:#111;  --sub:#5a5a56; --muted:#a0a09c;
      --green:#16a34a; --green-bg:#dcfce7;
      --red:#dc2626;   --red-bg:#fee2e2;
      --blue:#2563eb;  --blue-bg:#dbeafe;
      --r:16px; --pill:999px;
    }
    body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

    /* ── NAV ── */
    nav{
      background:rgba(244,244,242,.9);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
      border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;
      height:58px;padding:0 clamp(12px,4vw,48px);
      display:flex;align-items:center;justify-content:space-between;
    }
    .logo{font-size:19px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:7px}
    .nav-r{display:flex;align-items:center;gap:10px}
    .live-badge{display:flex;align-items:center;gap:5px;background:var(--red-bg);color:var(--red);font-size:11px;font-weight:600;letter-spacing:.3px;padding:4px 9px;border-radius:var(--pill)}
    .live-dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:blink 1.4s ease-in-out infinite}
    .ts{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
    .btn{background:var(--card);border:1px solid var(--border);border-radius:var(--pill);padding:5px 13px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--text);transition:background .15s,transform .1s}
    .btn:hover{background:var(--border)}.btn:active{transform:scale(.97)}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    /* ── LEAGUE BAR ── */
    .league-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 clamp(12px,4vw,48px);display:flex;overflow-x:auto;scrollbar-width:none}
    .league-bar::-webkit-scrollbar{display:none}
    .lg-btn{display:flex;align-items:center;gap:7px;padding:13px 18px;border:none;background:none;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;transition:color .2s,border-color .2s}
    .lg-btn:hover{color:var(--text)}
    .lg-btn.active{color:var(--text);border-bottom-color:var(--text)}
    .lg-flag{font-size:16px}

    /* ── TABS ── */
    .tab-row{max-width:1200px;margin:0 auto;padding:20px clamp(12px,4vw,48px) 0}
    .pills{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:var(--pill);padding:4px;width:fit-content}
    .tab-btn{padding:7px 18px;border-radius:var(--pill);border:none;background:none;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;color:var(--sub);cursor:pointer;transition:all .2s}
    .tab-btn.active{background:var(--text);color:#fff}

    /* ── LAYOUT ── */
    .page{max-width:1200px;margin:0 auto;padding:16px clamp(12px,4vw,48px) 48px;display:grid;grid-template-columns:1fr 308px;gap:20px;align-items:start}
    @media(max-width:860px){.page{grid-template-columns:1fr}.sidebar{display:none}}

    /* ── DATE LABEL ── */
    .dlabel{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin:18px 0 8px}
    .dlabel:first-child{margin-top:0}

    /* ── MATCH CARD ── */
    .mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;display:grid;grid-template-columns:1fr 92px 1fr;align-items:center;gap:10px;margin-bottom:7px;transition:box-shadow .2s,transform .2s;cursor:default}
    .mcard:hover{box-shadow:0 4px 18px rgba(0,0,0,.07);transform:translateY(-1px)}
    .mcard.live{border-color:#fca5a5;background:linear-gradient(135deg,#fff,#fff6f6)}
    .tc{display:flex;flex-direction:column;gap:2px}
    .tc.r{align-items:flex-end;text-align:right}
    .tn{font-size:14px;font-weight:600;line-height:1.2}
    .tn.dim{color:var(--muted);font-weight:400}
    .ta{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.5px}
    .sc{display:flex;flex-direction:column;align-items:center;gap:4px}
    .sd{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}
    .sd.lv{color:var(--red)}
    .sp{font-size:10px;font-weight:600;letter-spacing:.4px;padding:2px 8px;border-radius:var(--pill)}
    .sp.ft{background:var(--border);color:var(--sub)}
    .sp.lv{background:var(--red-bg);color:var(--red);animation:blink 1.4s ease-in-out infinite}

    /* ── FIXTURE CARD ── */
    .fcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:7px;transition:box-shadow .2s}
    .fcard:hover{box-shadow:0 4px 18px rgba(0,0,0,.07)}
    .ftop{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:10px}
    .ftime{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--blue);text-align:center}
    .fvs{font-size:10px;color:var(--muted);font-weight:500;text-align:center;display:block;margin-top:1px}
    .pbar{height:4px;border-radius:3px;display:flex;overflow:hidden;background:var(--border)}
    .ps{transition:width .6s ease}
    .ph{background:var(--text)}.pd{background:#d1d5db}.pa{background:#9ca3af}
    .plabels{display:flex;justify-content:space-between;margin-top:4px;font-size:9px;font-weight:500;color:var(--sub)}

    /* ── TABLE ── */
    .tbl-wrap{overflow:hidden}
    table.tbl{width:100%;border-collapse:collapse;font-size:13px}
    .tbl thead th{padding:9px 10px;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;background:#f9f9f7;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap}
    .tbl thead th.club{text-align:left}
    .tbl tbody td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:middle;text-align:center;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--sub)}
    .tbl tbody td.club{text-align:left;font-family:'Outfit',sans-serif;font-weight:600;font-size:13px;color:var(--text)}
    .tbl tbody tr:last-child td{border-bottom:none}
    .tbl tbody tr:hover td{background:#f9f9f7}
    .pos{font-size:11px;color:var(--muted);width:22px}
    .pos.cl{color:var(--green);font-weight:700}.pos.eu{color:var(--blue);font-weight:700}.pos.rel{color:var(--red);font-weight:700}
    .pts{font-weight:700;color:var(--text)}
    .gd-pos{color:var(--green)}.gd-neg{color:var(--red)}

    /* ── SIDEBAR ── */
    .scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
    .sh{padding:13px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
    .sh span{font-size:11px;font-weight:400;color:var(--muted)}
    .stbl{width:100%;border-collapse:collapse;font-size:12px}
    .stbl thead th{padding:7px 10px;font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;background:#f9f9f7;border-bottom:1px solid var(--border);text-align:center}
    .stbl thead th.cn{text-align:left}
    .stbl tbody td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--sub)}
    .stbl tbody td.cn{text-align:left;font-family:'Outfit',sans-serif;font-weight:600;font-size:12px;color:var(--text)}
    .stbl tbody tr:last-child td{border-bottom:none}
    .stbl tbody tr:hover td{background:#f9f9f7}
    .spts{font-weight:700;color:var(--text)}
    .zone-row{display:flex;flex-wrap:wrap;gap:10px;padding:9px 14px;background:#f9f9f7;border-top:1px solid var(--border);font-size:9px;font-weight:600;color:var(--sub)}
    .zd{width:7px;height:7px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}

    /* ── LOADING / ERROR / EMPTY ── */
    .loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:var(--muted);font-size:13px;font-weight:500}
    .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite}
    .empty{text-align:center;padding:48px;color:var(--muted);font-size:13px}
    .error-box{background:#fff5f5;border:1px solid #fca5a5;border-radius:var(--r);padding:20px 24px;color:var(--red);font-size:13px;line-height:1.6}
    .error-box strong{display:block;margin-bottom:6px;font-size:14px}
    .error-box code{background:#fee2e2;padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px}

    /* ── ANIMS ── */
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .fade{animation:fadeUp .28s ease both}
  </style>
</head>
<body>

<nav>
  <div class="logo">⚽ Kickoff</div>
  <div class="nav-r">
    <div class="live-badge"><div class="live-dot"></div>Live</div>
    <div class="ts" id="ts">—</div>
    <button class="btn" id="refBtn" onclick="fetchAndRender()">↻ Refresh</button>
  </div>
</nav>

<div class="league-bar">
  <button class="lg-btn active" data-l="epl"     onclick="switchLeague('epl',this)"><span class="lg-flag">🏴󠁧󠁢󠁥󠁮󠁧󠁿</span>Premier League</button>
  <button class="lg-btn"        data-l="la_liga"  onclick="switchLeague('la_liga',this)"><span class="lg-flag">🇪🇸</span>La Liga</button>
  <button class="lg-btn"        data-l="serie_a"  onclick="switchLeague('serie_a',this)"><span class="lg-flag">🇮🇹</span>Serie A</button>
  <button class="lg-btn"        data-l="ligue_1"  onclick="switchLeague('ligue_1',this)"><span class="lg-flag">🇫🇷</span>Ligue 1</button>
</div>

<div class="tab-row">
  <div class="pills">
    <button class="tab-btn active" onclick="setTab('results',this)">Results</button>
    <button class="tab-btn" onclick="setTab('fixtures',this)">Fixtures</button>
    <button class="tab-btn" onclick="setTab('table',this)">Table</button>
  </div>
</div>

<div class="page">
  <div class="main-col">
    <div id="main"><div class="loading"><div class="spinner"></div>Loading live data…</div></div>
  </div>
  <aside class="sidebar">
    <div id="side"></div>
  </aside>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const LEAGUES = {
  epl:     { name:'Premier League', flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', zones:{cl:4,eu:6,rel:18} },
  la_liga: { name:'La Liga',        flag:'🇪🇸',        zones:{cl:4,eu:7,rel:18} },
  serie_a: { name:'Serie A',        flag:'🇮🇹',        zones:{cl:4,eu:7,rel:18} },
  ligue_1: { name:'Ligue 1',        flag:'🇫🇷',        zones:{cl:3,eu:5,rel:16} },
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let league = 'epl';
let tab    = 'results';
let cache  = {};          // league → { games, fixtures, table, fetched_at }
let loading = false;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmtDate = s => new Date(s).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
const fmtTime = s => new Date(s).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
function groupBy(arr,fn){return arr.reduce((a,g)=>{const k=fn(g);(a[k]=a[k]||[]).push(g);return a},{})}
function posClass(r,z){return r<=z.cl?'cl':r<=z.eu?'eu':r>=z.rel?'rel':''}
function gdStr(n){return n>0?`+${n}`:String(n)}

// ─── FETCH ───────────────────────────────────────────────────────────────────
async function fetchLeague(l) {
  const res = await fetch(`/api/scores?league=${l}`);
  if (!res.ok) {
    const err = await res.json().catch(()=>({error:`HTTP ${res.status}`}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function fetchAndRender() {
  if (loading) return;
  loading = true;
  const btn = document.getElementById('refBtn');
  btn.disabled = true;
  btn.textContent = '↻ Loading…';

  // Show spinner only if no cached data yet
  if (!cache[league]) {
    document.getElementById('main').innerHTML = `<div class="loading"><div class="spinner"></div>Fetching live data…</div>`;
    document.getElementById('side').innerHTML = '';
  }

  try {
    const data = await fetchLeague(league);
    cache[league] = data;
    const t = new Date(data.fetched_at || Date.now());
    document.getElementById('ts').textContent = t.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  } catch(err) {
    // If we have cached data, just keep showing it and show a small toast
    if (!cache[league]) {
      document.getElementById('main').innerHTML = errorBox(err.message);
    } else {
      console.warn('Refresh failed, keeping cached data:', err.message);
    }
  } finally {
    loading = false;
    btn.disabled = false;
    btn.textContent = '↻ Refresh';
    if (cache[league]) { render(); renderSidebar(); }
  }
}

function errorBox(msg) {
  const isKeyError = msg.includes('SPORTRADAR_API_KEY') || msg.includes('not set');
  return `<div class="error-box">
    <strong>⚠️ ${isKeyError ? 'API key not configured' : 'Could not load data'}</strong>
    ${isKeyError
      ? `Add your SportRadar API key to Vercel:<br>
         1. Go to <strong>vercel.com → Your Project → Settings → Environment Variables</strong><br>
         2. Add <code>SPORTRADAR_API_KEY</code> = your key<br>
         3. Get a free trial key at <a href="https://developer.sportradar.com" target="_blank" style="color:var(--red)">developer.sportradar.com</a><br>
         4. Redeploy.`
      : `Error: <code>${msg}</code><br>Check your API key and Vercel function logs.`
    }
  </div>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  if (!cache[league]) return;
  if (tab==='results')  renderResults();
  else if(tab==='fixtures') renderFixtures();
  else renderTable();
}

// ─── RESULTS ─────────────────────────────────────────────────────────────────
function renderResults() {
  const { games=[] } = cache[league];
  const live = games.filter(g => ['live','inprogress','in_progress'].includes(g.status));
  const done = games.filter(g => ['closed','ended','complete','final'].includes(g.status));

  let html = '';
  if (live.length) {
    html += `<div class="dlabel">🔴 Live Now</div>`;
    live.forEach(g => html += mcard(g, true));
  }
  const grouped = groupBy([...done].reverse(), g => fmtDate(g.start_time));
  Object.keys(grouped).reverse().forEach(date => {
    html += `<div class="dlabel">${date}</div>`;
    grouped[date].forEach(g => html += mcard(g, false));
  });

  if (!html) html = `<div class="empty">No recent results.</div>`;
  document.getElementById('main').innerHTML = `<div class="fade">${html}</div>`;
}

function mcard(g, live) {
  const hs = g.home_score ?? 0, as_ = g.away_score ?? 0;
  const hw = hs > as_, aw = as_ > hs;
  return `<div class="mcard${live?' live':''}">
    <div class="tc"><div class="tn${!hw&&!live?' dim':''}">${g.home_name||g.home}</div><div class="ta">${g.home}</div></div>
    <div class="sc">
      <div class="sd${live?' lv':''}">${hs} – ${as_}</div>
      <div class="sp ${live?'lv':'ft'}">${live?'● LIVE':'FT'}</div>
    </div>
    <div class="tc r"><div class="tn${!aw&&!live?' dim':''}">${g.away_name||g.away}</div><div class="ta">${g.away}</div></div>
  </div>`;
}

// ─── FIXTURES ────────────────────────────────────────────────────────────────
function renderFixtures() {
  const { fixtures=[] } = cache[league];
  const grouped = groupBy(fixtures, g => fmtDate(g.start_time));
  let html = '';

  Object.keys(grouped).forEach(date => {
    html += `<div class="dlabel">${date}</div>`;
    grouped[date].forEach(g => {
      const wp = g.win_probability;
      const hp = wp?.home ?? null;
      const dp = wp?.draw ?? null;
      const ap = wp?.away ?? null;
      html += `<div class="fcard">
        <div class="ftop">
          <div class="tc"><div class="tn">${g.home_name||g.home}</div><div class="ta">${g.home}</div></div>
          <div><div class="ftime">${fmtTime(g.start_time)}</div><span class="fvs">vs</span></div>
          <div class="tc r"><div class="tn">${g.away_name||g.away}</div><div class="ta">${g.away}</div></div>
        </div>
        ${hp!==null?`
        <div class="pbar">
          <div class="ps ph" style="width:${hp}%"></div>
          <div class="ps pd" style="width:${dp}%"></div>
          <div class="ps pa" style="width:${ap}%"></div>
        </div>
        <div class="plabels">
          <span>${Math.round(hp)}% Home</span>
          <span>${Math.round(dp)}% Draw</span>
          <span>${Math.round(ap)}% Away</span>
        </div>`:''}
      </div>`;
    });
  });

  if (!html) html = `<div class="empty">No upcoming fixtures.</div>`;
  document.getElementById('main').innerHTML = `<div class="fade">${html}</div>`;
}

// ─── TABLE ───────────────────────────────────────────────────────────────────
function renderTable() {
  const { table=[] } = cache[league];
  const meta = LEAGUES[league];
  if (!table.length) { document.getElementById('main').innerHTML = `<div class="empty">Table not available.</div>`; return; }

  const rows = table.map(s => {
    const pc = posClass(s.rank, meta.zones);
    const gd = s.gd ?? ((s.gf??0)-(s.ga??0));
    return `<tr>
      <td class="pos ${pc}">${s.rank}</td>
      <td class="club">${s.name}</td>
      <td>${s.played ?? (s.wins+s.draws+s.losses)}</td>
      <td>${s.wins}</td><td>${s.draws}</td><td>${s.losses}</td>
      <td>${s.gf??'—'}</td><td>${s.ga??'—'}</td>
      <td class="${gd>0?'gd-pos':gd<0?'gd-neg':''}">${gdStr(gd)}</td>
      <td class="pts">${s.points}</td>
    </tr>`;
  }).join('');

  document.getElementById('main').innerHTML = `<div class="fade tbl-wrap">
    <table class="tbl">
      <thead><tr>
        <th>#</th><th class="club">Club</th>
        <th>P</th><th>W</th><th>D</th><th>L</th>
        <th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="zone-row">
      <span><span class="zd" style="background:#16a34a"></span>Champions League</span>
      <span><span class="zd" style="background:#2563eb"></span>Europa / Conference</span>
      <span><span class="zd" style="background:#dc2626"></span>Relegation</span>
    </div>
  </div>`;
}

// ─── SIDEBAR (mini table) ────────────────────────────────────────────────────
function renderSidebar() {
  const d = cache[league];
  if (!d) { document.getElementById('side').innerHTML = ''; return; }
  const meta = LEAGUES[league];
  const top10 = (d.table||[]).slice(0,10);

  const rows = top10.map(s => {
    const pc = posClass(s.rank, meta.zones);
    return `<tr>
      <td class="pos ${pc}">${s.rank}</td>
      <td class="cn">${s.name}</td>
      <td>${s.played ?? (s.wins+s.draws+s.losses)}</td>
      <td class="spts">${s.points}</td>
    </tr>`;
  }).join('');

  document.getElementById('side').innerHTML = `
    <div class="scard">
      <div class="sh">${meta.flag} ${meta.name} <span>2025/26</span></div>
      <table class="stbl">
        <thead><tr><th>#</th><th class="cn">Club</th><th>P</th><th>Pts</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="zone-row">
        <span><span class="zd" style="background:#16a34a"></span>UCL</span>
        <span><span class="zd" style="background:#2563eb"></span>UEL</span>
        <span><span class="zd" style="background:#dc2626"></span>REL</span>
      </div>
    </div>`;
}

// ─── CONTROLS ────────────────────────────────────────────────────────────────
function switchLeague(l, el) {
  league = l;
  document.querySelectorAll('.lg-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (cache[l]) { render(); renderSidebar(); }
  else fetchAndRender();
}

function setTab(t, el) {
  tab = t;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
fetchAndRender();

// Auto-refresh every 60 seconds
setInterval(() => {
  // Silently re-fetch in background, update cache, re-render
  fetchLeague(league).then(data => {
    cache[league] = data;
    const t = new Date(data.fetched_at || Date.now());
    document.getElementById('ts').textContent = t.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    render();
    renderSidebar();
  }).catch(err => console.warn('Auto-refresh failed:', err.message));
}, 60_000);
</script>
</body>
</html>
